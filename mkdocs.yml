site_name: parsimony-mcp
site_url: https://docs.parsimony.dev/mcp/
site_description: MCP server adapter for parsimony — exposes installed connectors as MCP tools to Claude Desktop, Cursor, and other agent runtimes.
site_author: Ockham.sh
repo_url: https://github.com/ockham-sh/parsimony-mcp
repo_name: ockham-sh/parsimony-mcp
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

nav:
  - Overview: index.md
  - Getting Started:
      - Installation: installation.md
      - Configuration: configuration.md
      - Troubleshooting: troubleshooting.md
  - Reference:
      - API Reference: api-reference.md
      - Programmatic Use: programmatic-use.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ockham-sh/parsimony-mcp
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/parsimony-mcp/
