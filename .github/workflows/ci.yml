name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Kernel source pin. Both jobs check out `ockham-sh/parsimony` alongside
# this repo so the workspace-level `[tool.uv.sources]` override (which
# points at `../parsimony`) resolves to a real path on the runner. Bump
# KERNEL_REF when the kernel lands a new contract-v1 alpha. Drop the
# side-by-side checkout (and the [tool.uv.sources] entry) once the kernel
# release matches the pin in pyproject.toml.
env:
  KERNEL_REPO: ockham-sh/parsimony
  KERNEL_REF: main

jobs:
  test:
    name: Test — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: parsimony-mcp
    steps:
      # TODO(security): pin actions by commit SHA before v0.1.0 (non-alpha)
      # release — matches Hunt's Principle 5 recommendation. Tag pins here
      # mirror the parsimony-connectors convention for now.
      - uses: actions/checkout@v4
        with:
          path: parsimony-mcp

      - uses: actions/checkout@v4
        with:
          repository: ${{ env.KERNEL_REPO }}
          ref: ${{ env.KERNEL_REF }}
          path: parsimony

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync workspace
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check parsimony_mcp tests

      - name: Mypy
        run: uv run mypy parsimony_mcp

      - name: Pytest
        run: uv run pytest tests

      - name: Build wheel + sdist
        run: uv build

  audit:
    name: pip-audit dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parsimony-mcp
    steps:
      - uses: actions/checkout@v4
        with:
          path: parsimony-mcp

      - uses: actions/checkout@v4
        with:
          repository: ${{ env.KERNEL_REPO }}
          ref: ${{ env.KERNEL_REF }}
          path: parsimony

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync workspace
        run: uv sync --extra dev

      - name: pip-audit
        # --skip-editable skips parsimony-core (resolved editable from the
        # sibling kernel checkout via [tool.uv.sources]) and parsimony-mcp
        # itself. Kernel vulnerabilities are caught by the kernel's own
        # pip-audit job; what matters here is the transitive PyPI surface
        # (mcp, pandas, pydantic, python-dotenv, toon-format), which IS
        # audited. Drop --strict because pip-audit treats every editable
        # skip as a strict-mode failure even when intentional.
        run: uv run pip-audit --skip-editable --ignore-vuln GHSA-none
