name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      # TODO(security): pin actions by commit SHA before v0.1.0 (non-alpha)
      # release — matches Hunt's Principle 5 recommendation. Tag pins here
      # mirror the parsimony-connectors convention for now.
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        run: uv pip install --system -e ".[dev]"

      - name: Ruff
        run: uv run --no-sync ruff check parsimony_mcp tests

      - name: Mypy
        run: uv run --no-sync mypy parsimony_mcp

      - name: Pytest
        run: uv run --no-sync pytest tests

      - name: Build wheel + sdist
        run: uv build

  audit:
    name: pip-audit dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: uv pip install --system -e ".[dev]"

      - name: pip-audit
        run: uv run --no-sync pip-audit --strict --ignore-vuln GHSA-none
